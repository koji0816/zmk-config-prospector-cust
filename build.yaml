---
include:
  # Scanner - Non-Touch Mode (display only, no swipe navigation)
  - board: xiao_ble//zmk
    shield: prospector_scanner
    cmake-args: -DZEPHYR_EXTRA_MODULES=../../config/prospector-zmk-module
    artifact-name: prospector_scanner

  # Scanner - Touch Mode (swipe navigation + settings screens)
  - board: xiao_ble//zmk
    shield: prospector_scanner
    cmake-args: -DEXTRA_CONF_FILE=../../config/prospector_scanner_touch.conf -DZEPHYR_EXTRA_MODULES=../../config/prospector-zmk-module
    artifact-name: prospector_scanner_touch

  # Settings reset utility 
  - board: xiao_ble//zmk
    shield: settings_reset
    cmake-args: -DZEPHYR_EXTRA_MODULES=../../config/prospector-zmk-module
